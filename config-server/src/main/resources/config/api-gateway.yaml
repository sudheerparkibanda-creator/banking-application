spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: customer-service
              uri: lb://customer-service
              predicates:
                - Path=/api/customers,/api/customers/**
              filters:
                - StripPrefix=1

            - id: account-service
              uri: lb://account-service
              predicates:
                - Path=/api/accounts,/api/accounts/**
              filters:
                - StripPrefix=1

server:
  port: ${SERVER_PORT:8080}

eureka:
  client:
    service-url:
      default-zone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    instance-id: ${spring.application.name}:${server.port:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
