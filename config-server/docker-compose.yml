services:
  config-server:
    image: config-server:latest
    container_name: config-server
    build:
      context: .
    ports:
      - "8888:8888"
    environment:
      - SPRING_PROFILES_ACTIVE=native
      - EUREKA_SERVER_URL=http://localhost:8761/eureka/
    networks:
      - banking-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8888/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  service-registry:
    image: service-registry:latest
    container_name: service-registry
    build:
      context: ../service-registry
    ports:
      - "8761:8761"
    depends_on:
      config-server:
        condition: service_healthy
    networks:
      - banking-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  customer-service:
    image: customer-service:latest
    container_name: customer-service
    build:
      context: ../customer-service
    ports:
      - "8081:8081"
    depends_on:
      service-registry:
        condition: service_healthy
    environment:
      - CONFIG_SERVER_URL=http://localhost:8888
      - EUREKA_SERVER_URL=http://localhost:8761/eureka/
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://localhost:8761/eureka/
    networks:
      - banking-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  account-service:
    image: account-service:latest
    container_name: account-service
    build:
      context: ../account-service
    ports:
      - "8082:8082"
    depends_on:
      service-registry:
        condition: service_healthy
    environment:
      - CONFIG_SERVER_URL=http://localhost:8888
      - EUREKA_SERVER_URL=http://localhost:8761/eureka/
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://localhost:8761/eureka/
    networks:
      - banking-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  api-gateway:
    image: api-gateway:latest
    container_name: api-gateway
    build:
      context: ../api-gateway
    ports:
      - "8080:8080"
    depends_on:
      service-registry:
        condition: service_healthy
    environment:
      - CONFIG_SERVER_URL=http://localhost:8888
      - EUREKA_SERVER_URL=http://localhost:8761/eureka/
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://localhost:8761/eureka/
    networks:
      - banking-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

networks:
  banking-network:
    driver: bridge
    name: banking-network

