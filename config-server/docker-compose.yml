services:
  config-server:
    image: config-server:latest
    container_name: config-server
    build:
      context: .
    ports:
      - "8888:8888"
    environment:
      - EUREKA_HOSTNAME=config-server
    networks:
      - banking-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8888/actuator/health"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 920s

  service-registry:
    image: service-registry:latest
    container_name: service-registry
    build:
      context: ../service-registry
    ports:
      - "8761:8761"
    depends_on:
      config-server:
        condition: service_healthy
    environment:
      - CONFIG_SERVER_URL=http://config-server:8888
      - EUREKA_HOSTNAME=service-registry
    networks:
      - banking-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8761/eureka/apps"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 920s

  customer-service:
    image: customer-service:latest
    container_name: customer-service
    build:
      context: ../customer-service
    ports:
      - "8081:8081"
    depends_on:
      service-registry:
        condition: service_healthy
    environment:
      - CONFIG_SERVER_URL=http://config-server:8888
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-registry:8761/eureka/
      - EUREKA_INSTANCE_HOSTNAME=customer-service
      - EUREKA_CLIENT_INITIAL_INSTANCE_INFO_REPLICATION_INTERVAL_SECONDS=10
      - EUREKA_CLIENT_REGISTRY_FETCH_INTERVAL_SECONDS=5
      - EUREKA_CLIENT_EUREKA_SERVER_CONNECT_TIMEOUT_SECONDS=60
      - EUREKA_CLIENT_EUREKA_SERVER_READ_TIMEOUT_SECONDS=60
      - EUREKA_CLIENT_SHOULD_ENFORCE_SERVER_SSL=false
    networks:
      - banking-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8081/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 920s

  account-service:
    image: account-service:latest
    container_name: account-service
    build:
      context: ../account-service
    ports:
      - "8082:8082"
    depends_on:
      service-registry:
        condition: service_healthy
    environment:
      - CONFIG_SERVER_URL=http://config-server:8888
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-registry:8761/eureka/
      - EUREKA_INSTANCE_HOSTNAME=account-service
      - EUREKA_CLIENT_INITIAL_INSTANCE_INFO_REPLICATION_INTERVAL_SECONDS=10
      - EUREKA_CLIENT_REGISTRY_FETCH_INTERVAL_SECONDS=5
      - EUREKA_CLIENT_EUREKA_SERVER_CONNECT_TIMEOUT_SECONDS=60
      - EUREKA_CLIENT_EUREKA_SERVER_READ_TIMEOUT_SECONDS=60
      - EUREKA_CLIENT_SHOULD_ENFORCE_SERVER_SSL=false
    networks:
      - banking-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8082/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 920s

  api-gateway:
    image: api-gateway:latest
    container_name: api-gateway
    build:
      context: ../api-gateway
    ports:
      - "8080:8080"
    depends_on:
      config-server:
        condition: service_healthy
      customer-service:
        condition: service_healthy
      account-service:
        condition: service_healthy
      service-registry:
        condition: service_healthy
    environment:
      - CONFIG_SERVER_URL=http://config-server:8888
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-registry:8761/eureka/
      - EUREKA_INSTANCE_HOSTNAME=api-gateway
      - EUREKA_CLIENT_INITIAL_INSTANCE_INFO_REPLICATION_INTERVAL_SECONDS=10
      - EUREKA_CLIENT_REGISTRY_FETCH_INTERVAL_SECONDS=5
      - EUREKA_CLIENT_EUREKA_SERVER_CONNECT_TIMEOUT_SECONDS=60
      - EUREKA_CLIENT_EUREKA_SERVER_READ_TIMEOUT_SECONDS=60
      - EUREKA_CLIENT_SHOULD_ENFORCE_SERVER_SSL=false
    networks:
      - banking-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 920s

networks:
  banking-network:
    driver: bridge
    name: banking-network

